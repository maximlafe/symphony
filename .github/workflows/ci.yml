name: ci

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap Elixir toolchain
        uses: ./.github/actions/setup-elixir
        with:
          cache-scope: ci-pr-contract

      - name: Validate PR body contract
        shell: bash
        env:
          PR_BODY_JSON: ${{ toJson(github.event.pull_request.body) }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/ci-artifacts"
          set -o pipefail
          printf '%s' "$PR_BODY_JSON" | jq -r '.' > /tmp/pr_body.md
          mix pr_body.check --file /tmp/pr_body.md 2>&1 | tee "$GITHUB_WORKSPACE/ci-artifacts/pr-contract.log"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-pr-contract-diagnostics
          if-no-files-found: ignore
          path: ci-artifacts/pr-contract.log
