name: dashboard-checks

on:
  pull_request:
    paths:
      - .github/actions/setup-elixir/**
      - .github/workflows/**
      - Makefile
      - README.md
      - elixir/**
      - scripts/**
  push:
    branches:
      - main
    paths:
      - .github/actions/setup-elixir/**
      - .github/workflows/**
      - Makefile
      - README.md
      - elixir/**
      - scripts/**

permissions:
  contents: read

concurrency:
  group: dashboard-checks-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  dashboard-checks:
    uses: ./.github/workflows/_elixir-command.yml
    with:
      artifact-name: dashboard-checks
      cache-scope: dashboard-checks
      command: make dashboard
      timeout-minutes: 20
    secrets: inherit
