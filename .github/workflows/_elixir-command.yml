name: _elixir-command

on:
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
      cache-scope:
        required: false
        type: string
        default: elixir
      command:
        required: true
        type: string
      timeout-minutes:
        required: false
        type: number
        default: 30

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap Elixir toolchain
        uses: ./.github/actions/setup-elixir
        with:
          cache-scope: ${{ inputs.cache-scope }}

      - name: Run ${{ inputs.artifact-name }}
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/ci-artifacts"
          set -o pipefail
          ${{ inputs.command }} 2>&1 | tee "$GITHUB_WORKSPACE/ci-artifacts/${{ inputs.artifact-name }}.log"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-diagnostics
          if-no-files-found: ignore
          path: |
            ci-artifacts/${{ inputs.artifact-name }}.log

