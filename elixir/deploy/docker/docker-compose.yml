name: symphony

services:
  symphony-let:
    build:
      context: ../../..
      dockerfile: elixir/deploy/docker/Dockerfile
    container_name: symphony-let
    restart: unless-stopped
    init: true
    env_file:
      - /etc/symphony/symphony.env
    environment:
      CODEX_HOME: /root/.codex
      SYMPHONY_REQUIRED_ENV_VARS: LINEAR_API_KEY GH_TOKEN OPENAI_API_KEY DATABASE_URL
      SOURCE_REPO_URL: https://github.com/maximlafe/lead_status.git
      POETRY_VIRTUALENVS_IN_PROJECT: "true"
      WORKFLOW_PATH: /srv/symphony/workflows/let.WORKFLOW.md
      SYMPHONY_PORT: "4101"
      SYMPHONY_WORKSPACE_ROOT: /srv/symphony/workspaces/let
      SYMPHONY_LOGS_ROOT: /srv/symphony/logs/let
    volumes:
      - /root/.codex:/root/.codex
      - /root/.codex-furrow:/root/.codex-furrow
      - /root/.codex-rebecca:/root/.codex-rebecca
      - /root/.codex-deborah:/root/.codex-deborah
      - /srv/symphony/app/workflows/letterl/maxime:/srv/symphony/workflows:ro
      - /srv/symphony/workspaces/let:/srv/symphony/workspaces/let
      - /srv/symphony/logs/let:/srv/symphony/logs/let
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4101:4101"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4101/api/v1/state >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
