name: ${SYMPHONY_COMPOSE_PROJECT:-symphony}

services:
  symphony:
    image: ${SYMPHONY_IMAGE:?Set SYMPHONY_IMAGE to a CI-published image reference.}
    container_name: ${SYMPHONY_CONTAINER_NAME:-symphony}
    pull_policy: always
    restart: unless-stopped
    init: true
    env_file:
      - ${SYMPHONY_RUNTIME_ENV_FILE:?Set SYMPHONY_RUNTIME_ENV_FILE to the host runtime env file.}
    environment:
      CODEX_HOME: ${CODEX_HOME:-/root/.codex}
      SOURCE_REPO_URL: ${SYMPHONY_SOURCE_REPO_URL:?Set SYMPHONY_SOURCE_REPO_URL to the target repository.}
      SYMPHONY_SOURCE_REPO_URL: ${SYMPHONY_SOURCE_REPO_URL:?Set SYMPHONY_SOURCE_REPO_URL to the target repository.}
      SYMPHONY_PUBLIC_HOST: ${SYMPHONY_PUBLIC_HOST:?Set SYMPHONY_PUBLIC_HOST to the public host name.}
      SYMPHONY_PUBLIC_PATH: ${SYMPHONY_PUBLIC_PATH:-/proxy/symphony}
      SYMPHONY_REQUIRED_ENV_VARS: ${SYMPHONY_REQUIRED_ENV_VARS:-LINEAR_API_KEY GH_TOKEN OPENAI_API_KEY SYMPHONY_SECRET_KEY_BASE SYMPHONY_PUBLIC_HOST}
      SYMPHONY_SERVER_HOST: ${SYMPHONY_SERVER_HOST:-0.0.0.0}
      SYMPHONY_SERVER_PATH: ${SYMPHONY_SERVER_PATH:-/proxy/symphony}
      POETRY_VIRTUALENVS_IN_PROJECT: "true"
      WORKFLOW_PATH: ${SYMPHONY_WORKFLOW_PATH:-/srv/symphony/workflows/WORKFLOW.md}
      SYMPHONY_PORT: ${SYMPHONY_PORT:-4101}
      SYMPHONY_WORKSPACE_ROOT: ${SYMPHONY_WORKSPACE_ROOT:?Set SYMPHONY_WORKSPACE_ROOT to the in-container workspace path.}
      SYMPHONY_LOGS_ROOT: ${SYMPHONY_LOGS_ROOT:?Set SYMPHONY_LOGS_ROOT to the in-container logs path.}
      SYMPHONY_RELEASE_SHA: ${SYMPHONY_RELEASE_SHA:-}
      SYMPHONY_IMAGE_TAG: ${SYMPHONY_IMAGE_TAG:-}
      SYMPHONY_IMAGE_DIGEST: ${SYMPHONY_IMAGE_DIGEST:-}
    volumes:
      - ${SYMPHONY_CODEX_HOME_HOST_PATH:?Set SYMPHONY_CODEX_HOME_HOST_PATH to the host CODEX_HOME directory.}:${CODEX_HOME:-/root/.codex}
      - ${SYMPHONY_WORKFLOW_HOST_PATH:?Set SYMPHONY_WORKFLOW_HOST_PATH to the host workflow directory.}:/srv/symphony/workflows:ro
      - ${SYMPHONY_WORKSPACE_HOST_PATH:?Set SYMPHONY_WORKSPACE_HOST_PATH to the host workspace directory.}:${SYMPHONY_WORKSPACE_ROOT:?Set SYMPHONY_WORKSPACE_ROOT to the in-container workspace path.}
      - ${SYMPHONY_LOGS_HOST_PATH:?Set SYMPHONY_LOGS_HOST_PATH to the host logs directory.}:${SYMPHONY_LOGS_ROOT:?Set SYMPHONY_LOGS_ROOT to the in-container logs path.}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SYMPHONY_PORT:-4101}:${SYMPHONY_PORT:-4101}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${SYMPHONY_PORT:-4101}/api/v1/state >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
